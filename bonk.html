function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck() {
  return shuffle(RAW_ENTRIES).map((entry, i) => {
    const onRoster = ROSTER.includes(entry.who);
    return {
      ...entry,
      id: i,
      options: shuffle([...ROSTER]),
      onRoster,
    };
  });
}
